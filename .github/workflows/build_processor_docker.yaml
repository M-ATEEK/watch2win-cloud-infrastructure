name: Build and Push Processor Docker Image

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (contains(github.event.head_commit.message, '[build-processor]') || contains(github.event.head_commit.message, '[build-all]')))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract image metadata
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SANITIZED_BRANCH=$(echo "${GITHUB_REF#refs/heads/}" | tr '/_' '-' | tr '[:upper:]' '[:lower:]')
          echo "REPO_OWNER=$REPO_OWNER" >> "$GITHUB_ENV"
          echo "BRANCH_NAME=$SANITIZED_BRANCH" >> "$GITHUB_ENV"

          if [ "${GITHUB_REF_NAME}" = "${{ github.event.repository.default_branch }}" ]; then
            echo "PUSH_LATEST=true" >> "$GITHUB_ENV"
          else
            echo "PUSH_LATEST=false" >> "$GITHUB_ENV"
          fi

      - name: Build Docker image
        run: |
          docker build -f watch2win-processor-service/production.Dockerfile \
            -t ghcr.io/${{ env.REPO_OWNER }}/watch2win-processor-service:${{ env.BRANCH_NAME }} \
            watch2win-processor-service/

      - name: Push branch Docker image
        run: |
          docker push ghcr.io/${{ env.REPO_OWNER }}/watch2win-processor-service:${{ env.BRANCH_NAME }}

      - name: Push latest Docker image
        if: env.PUSH_LATEST == 'true'
        run: |
          docker tag ghcr.io/${{ env.REPO_OWNER }}/watch2win-processor-service:${{ env.BRANCH_NAME }} \
            ghcr.io/${{ env.REPO_OWNER }}/watch2win-processor-service:latest
          docker push ghcr.io/${{ env.REPO_OWNER }}/watch2win-processor-service:latest
