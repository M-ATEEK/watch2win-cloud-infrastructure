name: Deploy Swarm Stacks

on:
  push:
    branches:
      - main
    paths:
      - "stacks/**"
      - "monitoring/**"
      - "deploy/**"
      - ".github/workflows/deploy_swarm_stacks.yaml"
  workflow_dispatch:
    inputs:
      auth_image_tag:
        description: "Image tag for auth service"
        required: false
        default: "latest"
      backend_image_tag:
        description: "Image tag for backend service"
        required: false
        default: "latest"
      processor_image_tag:
        description: "Image tag for processor service"
        required: false
        default: "latest"
      user_panel_image_tag:
        description: "Image tag for user panel"
        required: false
        default: "latest"
      admin_panel_image_tag:
        description: "Image tag for admin panel"
        required: false
        default: "latest"
      deploy_portainer:
        description: "Deploy Portainer stack"
        required: false
        type: boolean
        default: true
      deploy_traefik:
        description: "Deploy Traefik stack"
        required: false
        type: boolean
        default: true
      deploy_app:
        description: "Deploy application stack"
        required: false
        type: boolean
        default: true
      deploy_monitoring:
        description: "Deploy monitoring stack"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment bundle
        env:
          BASE_DOMAIN_SECRET: ${{ secrets.BASE_DOMAIN }}
          ACME_EMAIL_SECRET: ${{ secrets.ACME_EMAIL }}
          JWT_SECRET_VALUE: ${{ secrets.JWT_SECRET }}
          MONGO_DATABASE_SECRET: ${{ secrets.MONGO_DATABASE }}
          DO_TOKEN_SECRET: ${{ secrets.DO_TOKEN }}
          TRAEFIK_USERS_SECRET_VALUE: ${{ secrets.TRAEFIK_USERS }}
          PROMETHEUS_USERS_SECRET_VALUE: ${{ secrets.PROMETHEUS_USERS }}
          GRAFANA_ADMIN_PASSWORD_VALUE: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BASE_DOMAIN="$BASE_DOMAIN_SECRET"

          if [ -z "$BASE_DOMAIN" ]; then
            echo "BASE_DOMAIN secret is required."
            exit 1
          fi

          AUTH_IMAGE_TAG="${{ github.event.inputs.auth_image_tag }}"
          BACKEND_IMAGE_TAG="${{ github.event.inputs.backend_image_tag }}"
          PROCESSOR_IMAGE_TAG="${{ github.event.inputs.processor_image_tag }}"
          USER_PANEL_IMAGE_TAG="${{ github.event.inputs.user_panel_image_tag }}"
          ADMIN_PANEL_IMAGE_TAG="${{ github.event.inputs.admin_panel_image_tag }}"
          DEPLOY_PORTAINER="${{ github.event.inputs.deploy_portainer }}"
          DEPLOY_TRAEFIK="${{ github.event.inputs.deploy_traefik }}"
          DEPLOY_APP="${{ github.event.inputs.deploy_app }}"
          DEPLOY_MONITORING="${{ github.event.inputs.deploy_monitoring }}"

          [ -n "$AUTH_IMAGE_TAG" ] || AUTH_IMAGE_TAG="latest"
          [ -n "$BACKEND_IMAGE_TAG" ] || BACKEND_IMAGE_TAG="latest"
          [ -n "$PROCESSOR_IMAGE_TAG" ] || PROCESSOR_IMAGE_TAG="latest"
          [ -n "$USER_PANEL_IMAGE_TAG" ] || USER_PANEL_IMAGE_TAG="latest"
          [ -n "$ADMIN_PANEL_IMAGE_TAG" ] || ADMIN_PANEL_IMAGE_TAG="latest"
          [ -n "$DEPLOY_PORTAINER" ] || DEPLOY_PORTAINER="true"
          [ -n "$DEPLOY_TRAEFIK" ] || DEPLOY_TRAEFIK="true"
          [ -n "$DEPLOY_APP" ] || DEPLOY_APP="true"
          [ -n "$DEPLOY_MONITORING" ] || DEPLOY_MONITORING="true"

          mkdir -p deploy/secrets

          validate_htpasswd_secret() {
            secret_name="$1"
            secret_value="$2"

            if ! printf '%s' "$secret_value" | grep -Eq '^[^:]+:(\\$[^:]+\\$.*|\\{SHA\\}.*)$'; then
              echo "$secret_name must be an htpasswd-style entry like username:\$apr1\$... or username:{SHA}..."
              exit 1
            fi
          }

          validate_htpasswd_secret "TRAEFIK_USERS" "$TRAEFIK_USERS_SECRET_VALUE"
          validate_htpasswd_secret "PROMETHEUS_USERS" "$PROMETHEUS_USERS_SECRET_VALUE"

          cat > deploy/stack.env <<EOF
          GHCR_OWNER=$REPO_OWNER
          BASE_DOMAIN=$BASE_DOMAIN
          ACME_EMAIL=$ACME_EMAIL_SECRET
          JWT_SECRET=$JWT_SECRET_VALUE
          MONGO_DATABASE=$MONGO_DATABASE_SECRET
          AUTH_IMAGE_TAG=$AUTH_IMAGE_TAG
          BACKEND_IMAGE_TAG=$BACKEND_IMAGE_TAG
          PROCESSOR_IMAGE_TAG=$PROCESSOR_IMAGE_TAG
          USER_PANEL_IMAGE_TAG=$USER_PANEL_IMAGE_TAG
          ADMIN_PANEL_IMAGE_TAG=$ADMIN_PANEL_IMAGE_TAG
          TRAEFIK_HOST=traefik.$BASE_DOMAIN
          PORTAINER_HOST=portainer.$BASE_DOMAIN
          AUTH_HOST=auth.$BASE_DOMAIN
          BACKEND_HOST=backend.$BASE_DOMAIN
          PROCESSOR_HOST=processor.$BASE_DOMAIN
          USER_HOST=user.$BASE_DOMAIN
          ADMIN_HOST=admin.$BASE_DOMAIN
          GRAFANA_HOST=grafana.$BASE_DOMAIN
          LOKI_HOST=loki.$BASE_DOMAIN
          PROMETHEUS_HOST=prometheus.$BASE_DOMAIN
          DEPLOY_PORTAINER=$DEPLOY_PORTAINER
          DEPLOY_TRAEFIK=$DEPLOY_TRAEFIK
          DEPLOY_APP=$DEPLOY_APP
          DEPLOY_MONITORING=$DEPLOY_MONITORING
          EOF

          printf '%s' "$DO_TOKEN_SECRET" > deploy/secrets/do_token.txt
          printf '%s' "$TRAEFIK_USERS_SECRET_VALUE" > deploy/secrets/traefik_users.txt
          printf '%s' "$PROMETHEUS_USERS_SECRET_VALUE" > deploy/secrets/prometheus_users.txt
          printf '%s' "$GRAFANA_ADMIN_PASSWORD_VALUE" > deploy/secrets/grafana_admin_password.txt

      - name: Copy deployment bundle to Swarm manager
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          port: ${{ secrets.SWARM_PORT }}
          source: "stacks,monitoring,deploy"
          target: "~/watch2win-infra"

      - name: Deploy stacks on Swarm manager
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          port: ${{ secrets.SWARM_PORT }}
          script: |
            set -e
            cd ~/watch2win-infra

            if ! docker info --format '{{.Swarm.LocalNodeState}}' | grep -q active; then
              echo "Docker Swarm is not initialized on this host."
              exit 1
            fi

            set -a
            . ./deploy/stack.env
            set +a

            required_vars="BASE_DOMAIN ACME_EMAIL JWT_SECRET MONGO_DATABASE TRAEFIK_HOST PORTAINER_HOST AUTH_HOST BACKEND_HOST PROCESSOR_HOST USER_HOST ADMIN_HOST GRAFANA_HOST LOKI_HOST PROMETHEUS_HOST"
            for var_name in $required_vars; do
              if [ -z "${!var_name}" ]; then
                echo "Missing required deployment variable: $var_name"
                exit 1
              fi
            done

            ensure_secret() {
              secret_name="$1"
              secret_file="$2"

              if ! docker secret inspect "$secret_name" >/dev/null 2>&1; then
                docker secret create "$secret_name" "$secret_file" >/dev/null
              fi
            }

            ensure_config() {
              config_name="$1"
              config_file="$2"

              if ! docker config inspect "$config_name" >/dev/null 2>&1; then
                docker config create "$config_name" "$config_file" >/dev/null
              fi
            }

            validate_stack() {
              stack_file="$1"
              rendered_file="/tmp/$(basename "$stack_file").rendered.yml"
              docker stack config -c "$stack_file" > "$rendered_file"

              if grep -q 'Host(``)' "$rendered_file"; then
                echo "Validation failed for $stack_file: empty Host() rule detected."
                cat "$rendered_file"
                exit 1
              fi

              if grep -q '\${[A-Z0-9_]\+}' "$rendered_file"; then
                echo "Validation failed for $stack_file: unresolved environment placeholder detected."
                cat "$rendered_file"
                exit 1
              fi
            }

            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GHCR_PAT }}"

            docker network inspect agent_network >/dev/null 2>&1 || docker network create --driver overlay --attachable agent_network
            docker network inspect app_network >/dev/null 2>&1 || docker network create --driver overlay --attachable app_network
            docker volume inspect portainer_data >/dev/null 2>&1 || docker volume create portainer_data
            docker volume inspect letsencrypt >/dev/null 2>&1 || docker volume create letsencrypt

            if [ "$DEPLOY_PORTAINER" = "true" ]; then
              validate_stack stacks/portainer-stack.yml
              docker stack deploy -c stacks/portainer-stack.yml portainer-stack --with-registry-auth
            fi

            if [ "$DEPLOY_TRAEFIK" = "true" ]; then
              ensure_secret do_token deploy/secrets/do_token.txt
              ensure_secret traefik_users deploy/secrets/traefik_users.txt
              ensure_secret prometheus_users deploy/secrets/prometheus_users.txt
              validate_stack stacks/traefik-stack.yml
              docker stack deploy -c stacks/traefik-stack.yml traefik-stack --with-registry-auth
            fi

            if [ "$DEPLOY_APP" = "true" ]; then
              validate_stack stacks/app-stack.yml
              docker stack deploy -c stacks/app-stack.yml watch2win --with-registry-auth
            fi

            if [ "$DEPLOY_MONITORING" = "true" ]; then
              ensure_secret prometheus_users deploy/secrets/prometheus_users.txt
              ensure_secret grafana_admin_password deploy/secrets/grafana_admin_password.txt
              ensure_config prometheus_config monitoring/prometheus.yml
              ensure_config prometheus_alert_rules monitoring/alert.rules
              ensure_config alertmanager_config monitoring/alertmanager.yml
              ensure_config loki_config monitoring/loki-config.yaml
              ensure_config promtail_config monitoring/promtail-config.yaml
              ensure_config grafana_datasources monitoring/grafana/provisioning/datasources/datasources.yml
              validate_stack stacks/monitor-stack.yml
              docker stack deploy -c stacks/monitor-stack.yml monitor-stack --with-registry-auth
            fi
